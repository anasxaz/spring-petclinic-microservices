name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: p/java
        continue-on-error: true

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'springcommunity/spring-petclinic-api-gateway'
          format: 'table'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

  owasp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'spring-petclinic'
          path: '.'
          format: 'HTML'
        continue-on-error: true
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports/

  secrets-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify secrets are configured
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "❌ DOCKER_USERNAME not set!"
            exit 1
          else
            echo "✅ Secrets are properly configured"
          fi

  docker-push:
    runs-on: ubuntu-latest
    needs: [semgrep, trivy, owasp]
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./spring-petclinic-api-gateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/petclinic-api-gateway:latest
        continue-on-error: true
